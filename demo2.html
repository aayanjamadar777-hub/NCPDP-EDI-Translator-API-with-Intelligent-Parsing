<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome | NCPDP EDI Translator API</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Space Grotesk',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#050816,#08182d,#0b2345);
    overflow:hidden;
    color:#fff;
}

canvas{
    position:absolute;
    inset:0;
}

.container{
    position:relative;
    z-index:1;
    text-align:center;
    width:700px;
    padding:50px;
    background:rgba(10,18,40,.75);
    backdrop-filter:blur(18px);
    border:1px solid rgba(0,255,255,.18);
    border-radius:24px;
    box-shadow:0 0 40px rgba(0,255,255,.18);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:20px;
    background:linear-gradient(135deg,#00e5ff,#0066ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:700;
}

h1{
    margin-top:25px;
    font-size:42px;
}

h2{
    margin-top:10px;
    color:#84d8ff;
    font-size:22px;
    font-weight:500;
}

p{
    margin:30px auto;
    max-width:560px;
    color:#c9e7ff;
    line-height:1.7;
    font-size:16px;
}

button{
    padding:16px 45px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00d9ff,#0066ff);
    color:#fff;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px #00d9ff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="logo">AI</div>

<h1>Welcome</h1>

<h2>NCPDP EDI Translator API</h2>

<p>
Securely translate, parse, and process NCPDP EDI transactions with an
AI-powered intelligent parsing engine designed for modern healthcare
integration.
</p>

<button onclick="location.href='login.html'">
Get Started
</button>

</div>

<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
onresize=resize;

const pts=[];

for(let i=0;i<90;i++){
pts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<pts.length;i++){
let p=pts[i];

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#00e5ff";
ctx.fill();

for(let j=i+1;j<pts.length;j++){
let q=pts[j];
let dx=p.x-q.x;
let dy=p.y-q.y;
let d=Math.sqrt(dx*dx+dy*dy);

if(d<120){
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(q.x,q.y);
ctx.strokeStyle=`rgba(0,229,255,${1-d/120})`;
ctx.stroke();
}
}
}

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
