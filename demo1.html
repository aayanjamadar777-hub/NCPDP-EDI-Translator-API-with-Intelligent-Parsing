<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCPDP EDI Translator API - Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Space Grotesk',sans-serif;
}

body{
    background:#040814;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

/* Animated Grid */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    linear-gradient(rgba(0,255,255,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,255,.05) 1px,transparent 1px);
    background-size:60px 60px;
    animation:gridMove 18s linear infinite;
    transform:rotate(-8deg);
}

@keyframes gridMove{
    from{transform:translateY(0) rotate(-8deg);}
    to{transform:translateY(-60px) rotate(-8deg);}
}

/* Floating Hexagons */

.hex{
    position:absolute;
    width:90px;
    height:90px;
    border:1px solid rgba(0,255,255,.15);
    clip-path:polygon(25% 6%,75% 6%,100% 50%,75% 94%,25% 94%,0 50%);
    animation:float 10s ease-in-out infinite;
}

.hex:nth-child(1){
    top:8%;
    left:10%;
}

.hex:nth-child(2){
    right:8%;
    bottom:12%;
    animation-delay:3s;
}

@keyframes float{
    50%{
        transform:translateY(-25px) rotate(20deg);
    }
}

.card{
    position:relative;
    z-index:5;
    width:460px;
    padding:40px;
    border-radius:24px;
    background:rgba(8,15,35,.82);
    backdrop-filter:blur(20px);
    border:1px solid rgba(0,255,255,.18);
    box-shadow:0 0 45px rgba(0,255,255,.15);
}

.logo{
    width:78px;
    height:78px;
    margin:auto;
    border-radius:20px;
    background:linear-gradient(135deg,#00f5ff,#0066ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    animation:pulse 2.5s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.08);
box-shadow:0 0 25px cyan;
}
}

h2{
    text-align:center;
    margin-top:20px;
}

p{
    text-align:center;
    color:#8ccfff;
    margin:10px 0 30px;
    font-size:14px;
}

.input{
    margin-bottom:16px;
}

.input input,
.input select{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #1d4470;
    background:#071427;
    color:#fff;
    outline:none;
    transition:.3s;
}

.input input:focus,
.input select:focus{
    border-color:#00f7ff;
    box-shadow:0 0 18px rgba(0,255,255,.35);
}

button{
    width:100%;
    margin-top:10px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00d4ff,#0062ff);
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px #00dfff;
}

.ai-status{
    margin-top:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    color:#73ffd2;
    font-size:14px;
}

.dot{
    width:12px;
    height:12px;
    background:#00ffbf;
    border-radius:50%;
    animation:blink 1.5s infinite;
}

@keyframes blink{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(4);opacity:0;}
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.footer a{
    color:#67d8ff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="hex"></div>
<div class="hex"></div>

<div class="card">

<div class="logo">AI</div>

<h2>Create Account</h2>

<p>NCPDP EDI Translator API with Intelligent Parsing</p>

<form>

<div class="input">
<input type="text" placeholder="Organization Name">
</div>

<div class="input">
<input type="text" placeholder="Full Name">
</div>

<div class="input">
<input type="email" placeholder="Corporate Email">
</div>

<div class="input">
<input type="tel" placeholder="Mobile Number">
</div>

<div class="input">
<select>
<option>Select Role</option>
<option>Administrator</option>
<option>Developer</option>
<option>Healthcare Provider</option>
<option>Pharmacy</option>
<option>Payer</option>
</select>
</div>

<div class="input">
<input type="password" placeholder="Create Password">
</div>

<div class="input">
<input type="password" placeholder="Confirm Password">
</div>

<button>Create AI Account</button>

</form>

<div class="ai-status">
<div class="dot"></div>
<span>AI Identity Verification Ready</span>
</div>

<div class="footer">
Already have an account?
<a href="#">Sign In</a>
</div>

</div>

</body>
</html>
